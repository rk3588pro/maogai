<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>登录页 - 移动端原型</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --text-muted: #737373;
      --primary: #c41e3a;
      --primary-hover: #a01830;
      --primary-light: #fef2f4;
      --primary-glow: rgba(196, 30, 58, 0.35);
      --input-bg: #ffffff;
      --radius: 14px;
      --radius-sm: 10px;
      --glass: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(196, 30, 58, 0.15);
    }
    html, body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      width: 100%;
      max-width: 375px;
      margin: 0 auto;
      overflow-x: hidden;
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(196, 30, 58, 0.06), transparent);
    }
    /* 原型区 */
    .prototype {
      padding: 20px 20px 12px;
      min-height: 0;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary) 0%, #e11d48 100%);
      border-radius: 16px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: #fff;
      box-shadow: 0 8px 24px var(--primary-glow);
    }
    .app-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .field {
      position: relative;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }
    .field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }
    .field input:hover {
      border-color: #d4d4d4;
    }
    /* 记住我 */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
      cursor: pointer;
      user-select: none;
    }
    .remember-row input { display: none; }
    .remember-box {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .remember-row input:checked + .remember-box {
      background: var(--primary);
      border-color: var(--primary);
    }
    .remember-box::after {
      content: '';
      width: 6px;
      height: 10px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg) scale(0);
      margin-bottom: 3px;
      transition: transform 0.2s;
    }
    .remember-row input:checked + .remember-box::after {
      transform: rotate(45deg) scale(1);
    }
    .remember-row > span:last-child { font-size: 14px; color: var(--text-muted); }
    .remember-row:hover .remember-box { border-color: var(--primary); }
    /* 登录按钮：悬停、点击、光效 */
    .btn-login-wrap {
      position: relative;
      margin-top: 8px;
      overflow: visible;
    }
    .btn-login {
      position: relative;
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--primary) 0%, #a01830 100%);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.25s;
      box-shadow: 0 4px 16px var(--primary-glow);
      z-index: 1;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #e11d48);
      opacity: 0;
      filter: blur(12px);
      z-index: -1;
      transition: opacity 0.25s;
    }
    @keyframes btn-glow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--primary-glow);
    }
    .btn-login:hover::before {
      opacity: 0.5;
      animation: btn-glow 1.5s ease-in-out infinite;
    }
    .btn-login:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 12px var(--primary-glow);
    }
    .btn-login:active::before { opacity: 0; animation: none; }
    /* 链接区：磨砂玻璃悬停 */
    .link-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .link-box {
      display: inline-flex;
      padding: 8px 16px;
      border-radius: 20px;
      background: transparent;
      backdrop-filter: blur(0);
      -webkit-backdrop-filter: blur(0);
      border: 1px solid transparent;
      transition: background 0.25s, backdrop-filter 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .link-box:hover {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-color: var(--glass-border);
      box-shadow: 0 4px 16px rgba(196, 30, 58, 0.08);
    }
    .link {
      font-size: 14px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .link-box:hover .link { color: var(--primary-hover); }
    /* 设计说明区 */
    .spec {
      background: var(--card);
      border-radius: var(--radius);
      margin: 0 20px 20px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .spec-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border);
    }
    .spec p, .spec ul {
      font-size: 10.5px;
      line-height: 1.5;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .spec ul { padding-left: 14px; margin-bottom: 0; }
    .spec li { margin-bottom: 1px; }
    .spec strong { color: var(--text); font-weight: 600; }
    /* 交互反馈 */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 100;
      border: 1px solid var(--glass-border);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <section class="prototype" aria-label="登录原型">
    <div class="logo-area">
      <div class="logo" aria-hidden="true">◆</div>
      <div class="app-name">欢迎回来</div>
    </div>
    <form class="form" id="loginForm" novalidate>
      <div class="field">
        <label for="account">账号</label>
        <input type="text" id="account" name="account" placeholder="请输入手机号/邮箱" autocomplete="username" maxlength="32">
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" maxlength="20">
      </div>
      <label class="remember-row">
        <input type="checkbox" id="remember" name="remember" aria-label="记住我">
        <span class="remember-box"></span>
        <span>记住我</span>
      </label>
      <div class="btn-login-wrap">
        <button type="submit" class="btn-login">登 录</button>
      </div>
    </form>
    <div class="link-wrap">
      <span class="link-box">
        <a href="#" class="link" id="forgotLink">忘记密码</a>
      </span>
      <span class="link-box">
        <a href="#" class="link" id="registerLink">注册账号</a>
      </span>
    </div>
  </section>

  <section class="spec" aria-label="设计说明">
    <h2 class="spec-title">设计说明</h2>
    <p><strong>布局：</strong>顶部品牌区 + 表单区 + 记住我 + 登录按钮 + 辅助链接，一屏内完整展示。</p>
    <p><strong>配色：</strong>红白主题，背景 #fafafa、主色 #c41e3a，简洁大方。</p>
    <p><strong>交互：</strong>登录按钮悬停上浮+光效动画、点击缩放反馈；记住我可切换选中；忘记密码/注册链接悬停为磨砂玻璃圆角块。</p>
    <p><strong>规范：</strong>圆角 10–14px、链接区 20px 圆角磨砂玻璃，符合移动端热区与视觉层次。</p>
    <p><strong>原型交互：</strong>登录/忘记密码/注册有 Toast 反馈；记住我可点击切换勾选状态。</p>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const form = document.getElementById('loginForm');
    const account = document.getElementById('account');
    const password = document.getElementById('password');
    const forgotLink = document.getElementById('forgotLink');
    const registerLink = document.getElementById('registerLink');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(window._toastT);
      window._toastT = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const acc = account.value.trim();
      const pwd = password.value;
      if (!acc) {
        showToast('请输入账号');
        account.focus();
        return;
      }
      if (!pwd) {
        showToast('请输入密码');
        password.focus();
        return;
      }
      showToast('登录功能为原型演示，未对接后端');
    });

    forgotLink.addEventListener('click', function(e) {
      e.preventDefault();
      showToast('忘记密码为原型演示');
    });
    registerLink.addEventListener('click', function(e) {
      e.preventDefault();
      showToast('注册账号为原型演示');
    });
  </script>
</body>
</html>
